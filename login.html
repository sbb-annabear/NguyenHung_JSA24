<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./css/auth.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="./css/img/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./css/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./css/img/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
  </head>
  <body>
    <div class="form-wrapper">
      <h2>Sign In</h2>
      <form action="#">
        <div class="form-control">
          <label>Email address</label>
          <input id="email" type="text" required placeholder="Email" />
        </div>
        <div class="form-control">
          <label>Password</label>
          <input id="password" type="password" required placeholder="Password" />
        </div>
        <button type="submit">Sign In</button>
        <div class="form-help">
          <div class="remember-me">
            <input type="checkbox" id="remember-me" />
            <label for="remember-me">Remember me</label>
          </div>
          <a href="#">Need help?</a>
        </div>
      </form>
      <p>New to Hase? <a href="./register.html">Sign up now</a></p>
    </div>

    <script src="./js/login.js"></script>
  </body>
</html>
